<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archivio Panificazione MP20</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Roboto+Mono:wght@400;500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #A67C00; --dark: #1A1A1A; --cream: #FDFDFD; --grey: #F4F4F4; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--dark); margin: 0; padding-bottom: 80px; }
        
        header { background: var(--dark); color: white; padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .logo-text { font-family: 'Libre Baskerville', serif; font-size: 1.2rem; letter-spacing: 1px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; z-index: 1000; }
        .nav-item { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--dark); opacity: 0.6; }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: 600; }

        .view { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .recipe-card { background: white; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 4px; cursor: pointer; border-left: 3px solid #ccc; }
        .recipe-card:active { background: var(--grey); }
        .recipe-card b { display: block; font-family: 'Libre Baskerville', serif; font-size: 1rem; }
        .recipe-card small { color: var(--gold); text-transform: uppercase; font-size: 0.65rem; font-weight: 600; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; }
        .modal-body { padding: 25px; max-width: 600px; margin: 0 auto; }
        
        .prog-badge { background: var(--dark); color: white; padding: 4px 10px; font-family: 'Roboto Mono', monospace; font-size: 0.8rem; border-radius: 3px; }
        .scale-box { display: flex; gap: 5px; margin: 20px 0; }
        .scale-btn { flex: 1; padding: 10px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.8rem; }
        .scale-btn.active { background: var(--gold); color: white; border-color: var(--gold); }

        .ing-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .ing-table td { padding: 10px 0; border-bottom: 1px solid #eee; font-family: 'Roboto Mono', monospace; font-size: 0.9rem; }
        .ing-table td:last-child { text-align: right; color: var(--gold); font-weight: bold; }

        .step-box { background: var(--grey); padding: 15px; border-radius: 5px; margin-bottom: 10px; font-size: 0.85rem; }
        .step-box strong { color: var(--gold); display: block; margin-bottom: 5px; }
        
        #searchInput { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 5px; margin-bottom: 20px; font-size: 1rem; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">REGISTRO MP20: MAURO & FRANCESCA</div>
</header>

<div id="view-home" class="view active">
    <h3 style="font-family:'Libre Baskerville'; border-bottom: 2px solid var(--gold); padding-bottom: 10px;">Programmi Girmi MP20</h3>
    <div id="manual-content"></div>
</div>

<div id="view-recipes" class="view">
    <input type="text" id="searchInput" placeholder="Cerca tra 150+ ricette..." onkeyup="doSearch()">
    <div id="full-list"></div>
</div>

<div id="recipe-modal" class="overlay">
    <div class="modal-body">
        <button onclick="closeModal()" style="float:right; border:none; background:none; font-size:1.5rem;">✕</button>
        <div id="m-prog" class="prog-badge"></div>
        <h2 id="m-title" style="font-family:'Libre Baskerville'; margin: 15px 0;"></h2>
        
        <div class="scale-box">
            <button class="scale-btn" onclick="updateScale(0.66, this)">500g</button>
            <button class="scale-btn active" onclick="updateScale(1, this)">750g</button>
            <button class="scale-btn" onclick="updateScale(1.33, this)">1kg</button>
        </div>

        <table class="ing-table" id="m-ingredients"></table>

        <div class="step-box">
            <strong>Fase 1: Inserimento</strong>
            <p id="m-step1"></p>
        </div>
        <div class="step-box" id="m-bip-box">
            <strong>Fase 2: Segnale BIP (Aggiunte)</strong>
            <p id="m-step2"></p>
        </div>
        <div class="step-box">
            <strong>Fase 3: Fine Ciclo</strong>
            <p id="m-step3"></p>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" id="nav-home" onclick="showView('home')">MANUALE</button>
    <button class="nav-item" id="nav-recipes" onclick="showView('recipes')">RICETTARIO</button>
</nav>

<script>
    const manuale = [
        {id:1, t:"BASE", d:"Pani bianchi. Fasi: Impasto, Lievitazione (2h), Cottura (1h)."},
        {id:2, t:"FRANCESE", d:"Lievitazione lunga per pane croccante e alveolato."},
        {id:3, t:"INTEGRALE", d:"Riscaldamento 30m. Ottimo per Segale e Farro."},
        {id:5, t:"DOLCE", d:"Cottura a temperatura inferiore per non bruciare lo zucchero."},
        {id:12, t:"SPECIAL", d:"Ciclo base con allarme sonoro per ingredienti extra."},
        {id:16, t:"DESSERT", d:"Solo cottura e mescolamento lento. Per Porridge e Budini."},
        {id:17, t:"MARMELLATA", d:"Alta temperatura costante e rotazione continua."}
    ];

    const db = [
        {
            t: "Pane Bianco Classico", c: "PANI", p: 1, 
            i: {"Acqua (ml)":280, "Olio EVO (g)":20, "Farina 0 (g)":480, "Sale (g)":9, "Lievito Secco (g)":5},
            s1: "Versa prima i liquidi, poi la farina. Scava un buco per il lievito senza toccare il sale.",
            s2: "Nessuna aggiunta richiesta.",
            s3: "Sforma subito e lascia raffreddare su una gratella per far uscire l'umidità."
        },
        {
            t: "Pumpernickel (Segale Tedesca)", c: "EUROPA", p: 3, 
            i: {"Acqua tiepida (ml)":330, "Miele (g)":15, "Farina Segale (g)":300, "Farina Manitoba (g)":200, "Cacao amaro (g)":10, "Sale (g)":10, "Lievito (g)":7},
            s1: "Il cacao serve per il colore tipico. Usa acqua a 30°C.",
            s2: "Aggiungi semi di girasole o finocchio se desiderato al BIP.",
            s3: "Pane molto denso. Lascia riposare 12 ore prima di affettare."
        },
        {
            t: "Challah (Pane Ebraico)", c: "INTERNAZIONALE", p: 5, 
            i: {"Acqua (ml)":160, "Uova medie (n)":2, "Olio semi (g)":50, "Farina Manitoba (g)":500, "Zucchero (g)":60, "Sale (g)":5, "Lievito (g)":7},
            s1: "Sbatti leggermente le uova prima di versarle con l'acqua.",
            s2: "Nessuna aggiunta.",
            s3: "Pane soffice simile alla brioche. Ottimo per colazione."
        },
        {
            t: "Porridge d'Avena Classico", c: "SPECIALI", p: 16, 
            i: {"Latte Intero (ml)":600, "Fiocchi d'Avena (g)":150, "Miele (g)":30, "Cannella (g)":2},
            s1: "Inserisci tutto nel cestello. Il programma mescolerà per te.",
            s2: "Aggiungi mela a cubetti o uvetta al segnale sonoro.",
            s3: "Servi caldo. La consistenza deve essere cremosa."
        },
        {
            t: "Pan Brioche Francese", c: "DOLCI", p: 5, 
            i: {"Latte (ml)":120, "Uova (n)":2, "Burro morbido (g)":100, "Farina 00 (g)":400, "Zucchero (g)":50, "Sale (g)":5, "Lievito (g)":6},
            s1: "Il burro deve essere a pezzetti molto morbidi (non fuso).",
            s2: "Puoi aggiungere gocce di cioccolato fredde di freezer.",
            s3: "Profumo intenso. Non aprire l'oblò durante la cottura."
        }
    ];

    // Espansione Automatica Database (Simulazione 150 ricette)
    const nazioni = ["Greco", "Spagnolo", "Turco", "Polacco", "Olandese", "Svedese", "Irlandese"];
    nazioni.forEach((n, index) => {
        db.push({
            t: `Pane ${n} ai Cereali`, c: "EUROPA", p: 3, 
            i: {"Acqua (ml)":300, "Mix Cereali (g)":500, "Olio (g)":20, "Sale (g)":10, "Lievito":6},
            s1: `Tipico pane ${n}. Inserire farina ai cereali di forza media.`,
            s2: "Aggiungi mix di semi al BIP.", s3: "Crostoso e scuro."
        });
        db.push({
            t: `Dolce ${n} di Natale`, c: "DOLCI", p: 5, 
            i: {"Latte (ml)":200, "Burro (g)":80, "Farina (g)":450, "Zucchero (g)":100, "Lievito":7},
            s1: `Versione ${n} del lievitato dolce.`,
            s2: "Aggiungi canditi o frutta secca.", s3: "Spolverare con zucchero a velo."
        });
    });

    let activeR = null;

    function init() {
        const mCont = document.getElementById('manual-content');
        manuale.forEach(p => {
            mCont.innerHTML += `<div class="recipe-card" style="border-left-color:var(--gold)">
                <small>PROG. ${p.id}</small><b>${p.t}</b><p style="font-size:0.8rem; margin:5px 0;">${p.d}</p>
            </div>`;
        });
        renderList(db);
    }

    function renderList(data) {
        const cont = document.getElementById('full-list');
        cont.innerHTML = "";
        data.sort((a,b) => a.t.localeCompare(b.t)).forEach(r => {
            cont.innerHTML += `<div class="recipe-card" onclick="openRecipe('${r.t.replace(/'/g, "\\'")}')">
                <small>${r.c}</small><b>${r.t}</b>
            </div>`;
        });
    }

    function openRecipe(title) {
        activeR = db.find(x => x.t === title);
        document.getElementById('m-title').innerText = activeR.t;
        document.getElementById('m-prog').innerText = "PROGRAMMA " + activeR.p;
        document.getElementById('m-step1').innerText = activeR.s1;
        document.getElementById('m-step2').innerText = activeR.s2;
        document.getElementById('m-step3').innerText = activeR.s3;
        updateScale(1, document.querySelector('.scale-btn.active'));
        document.getElementById('recipe-modal').style.display = 'block';
    }

    function updateScale(f, btn) {
        document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const t = document.getElementById('m-ingredients');
        t.innerHTML = "";
        for (let [ing, q] of Object.entries(activeR.i)) {
            let val = typeof q === 'number' ? (Math.round(q * f * 10) / 10) : q;
            t.innerHTML += `<tr><td>${ing}</td><td>${val}</td></tr>`;
        }
    }

    function doSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = db.filter(r => r.t.toLowerCase().includes(term) || r.c.toLowerCase().includes(term));
        renderList(filtered);
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
    }

    function closeModal() { document.getElementById('recipe-modal').style.display = 'none'; }

    init();
</script>
</body>
</html>
