<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Forno di Mauro e Francesca</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #C5A059; --dark: #3E362E; --cream: #FAF7F2; --white: #ffffff; }

        body { 
            font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--dark); 
            margin: 0; padding-bottom: 80px; overflow-x: hidden;
        }

        header { 
            background: var(--white); padding: 30px 15px; text-align: center; 
            border-bottom: 2px solid var(--gold);
        }

        .logo-text { font-family: 'Libre Baskerville', serif; font-size: 1.6rem; font-style: italic; margin: 0; }

        /* Navigazione */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; background: var(--white); 
            display: flex; border-top: 1px solid #ddd; z-index: 2000;
        }
        .nav-item { 
            flex: 1; padding: 15px; border: none; background: none; 
            font-size: 0.7rem; letter-spacing: 1px; color: var(--dark); opacity: 0.5;
        }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: 600; }

        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Programmi Home */
        .prog-card { 
            background: var(--white); padding: 15px; margin-bottom: 12px; 
            border-left: 4px solid var(--gold); box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .prog-title { font-family: 'Libre Baskerville', serif; font-weight: 600; color: var(--gold); }

        /* Liste e Categorie */
        .cat-btn { 
            background: var(--white); margin-bottom: 15px; display: flex; 
            align-items: center; border: 1px solid #eee; cursor: pointer;
        }
        .cat-btn img { width: 80px; height: 80px; object-fit: cover; }
        .cat-btn span { padding-left: 20px; font-family: 'Libre Baskerville', serif; font-size: 1.1rem; }

        .recipe-item { 
            background: var(--white); padding: 10px; margin-bottom: 8px; 
            display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid #eee;
        }
        .recipe-item img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; margin-right: 15px; }

        /* Overlay Modale */
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 3000; overflow-y: auto;
        }
        .modal { 
            background: var(--white); width: 90%; max-width: 500px; margin: 40px auto; 
            position: relative; border-radius: 8px; overflow: hidden;
        }
        .modal-img { width: 100%; height: 200px; object-fit: cover; }
        .modal-body { padding: 20px; }

        .scale-box { display: flex; gap: 5px; margin-bottom: 20px; }
        .scale-btn { 
            flex: 1; padding: 10px; border: 1px solid var(--gold); background: white; 
            font-size: 0.7rem; cursor: pointer;
        }
        .scale-btn.active { background: var(--gold); color: white; }

        .ing-row { 
            display: flex; justify-content: space-between; padding: 8px 0; 
            border-bottom: 1px dotted #ccc; font-size: 0.9rem;
        }
        .ing-qty { color: var(--gold); font-weight: 600; }
        .note-box { 
            margin-top: 20px; padding: 15px; background: var(--cream); 
            border-radius: 4px; font-size: 0.85rem; font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">Il Forno di Mauro e Francesca</div>
    <div style="font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); margin-top: 5px;">RICETTARIO GIRMI MP20</div>
</header>

<div id="view-home" class="view active">
    <h3 style="text-align:center; font-family:'Libre Baskerville';">I 19 Programmi</h3>
    <div id="prog-list"></div>
</div>

<div id="view-categories" class="view">
    <div id="cat-list">
        <div class="cat-btn" onclick="filterCat('PANI')">
            <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200" alt="Pani">
            <span>I Pani di Mauro</span>
        </div>
        <div class="cat-btn" onclick="filterCat('DOLCI')">
            <img src="https://images.unsplash.com/photo-1488477181946-6428a0291777?w=200" alt="Dolci">
            <span>I Dolci di Francesca</span>
        </div>
        <div class="cat-btn" onclick="filterCat('DISPENSA')">
            <img src="https://images.unsplash.com/photo-1502741224143-90386d7f8c82?w=200" alt="Dispensa">
            <span>Marmellate e Yogurt</span>
        </div>
    </div>
</div>

<div id="view-list" class="view">
    <button onclick="showView('categories')" style="border:none; background:none; color:var(--gold); margin-bottom:15px;">← Indietro</button>
    <div id="recipe-list-container"></div>
</div>

<div id="view-index" class="view">
    <input type="text" id="searchInput" placeholder="Cerca ricetta..." onkeyup="doSearch()" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid var(--gold);">
    <div id="index-list"></div>
</div>

<div id="recipe-modal" class="overlay" onclick="if(event.target==this) closeRecipe()">
    <div class="modal">
        <img id="m-img" class="modal-img" src="" alt="Pane">
        <div class="modal-body">
            <h2 id="m-title" style="margin-top:0; font-family:'Libre Baskerville';"></h2>
            <p id="m-prog" style="font-size:0.7rem; color:var(--gold); font-weight:600; text-transform:uppercase;"></p>
            
            <div class="scale-box">
                <button class="scale-btn" onclick="renderIngredients(0.66, this)">500G</button>
                <button class="scale-btn active" onclick="renderIngredients(1, this)">750G</button>
                <button class="scale-btn" onclick="renderIngredients(1.33, this)">1KG</button>
            </div>

            <div id="m-ingredients"></div>
            <div id="m-notes" class="note-box"></div>
            <button onclick="closeRecipe()" style="width:100%; margin-top:20px; padding:12px; background:var(--dark); color:white; border:none;">CHIUDI</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" id="btn-home" onclick="showView('home')">MANUALE</button>
    <button class="nav-item" id="btn-categories" onclick="showView('categories')">RICETTE</button>
    <button class="nav-item" id="btn-index" onclick="showView('index')">CERCA</button>
</nav>

<script>
    const manuale = [
        {n:1, t:"Base", d:"Per pane bianco con Farina 0. Ciclo standard."},
        {n:2, t:"Francese", d:"Lievitazione lunga per crosta croccante."},
        {n:3, t:"Integrale", d:"Per farine grezze (Integrale, Segale)."},
        {n:5, t:"Dolce", d:"Per Brioche e impasti con molto burro/uova."},
        {n:12, t:"BIP Special", d:"Programma che avvisa quando aggiungere semi o noci."},
        {n:15, t:"Yogurt", d:"Mantiene 40°C costanti per 8 ore."},
        {n:17, t:"Marmellata", d:"Cuoce e mescola frutta e zucchero."}
    ];

    const ricette = [
        {
            cat:"PANI", nome:"Pane Bianco di Mauro", prog:1, 
            img:"https://images.unsplash.com/photo-1589367920969-ab8e050bab0e?w=500",
            note:"Il classico di casa. Usa Farina 0 di media forza.",
            base:{"Acqua (ml)":280, "Farina 0 (g)":480, "Olio EVO (g)":20, "Sale (g)":9, "Lievito Secco (g)":5}
        },
        {
            cat:"PANI", nome:"Pane al Finocchietto", prog:12, 
            img:"https://images.unsplash.com/photo-1549931319-a545dcf3bc73?w=500",
            note:"Tosta i semi di finocchio in padella 2 min prima del BIP.",
            base:{"Acqua (ml)":280, "Farina 0 (g)":480, "Semi finocchio tostati (g)":12, "Sale (g)":9, "Lievito (g)":5}
        },
        {
            cat:"PANI", nome:"Pane di Segale Alpino", prog:3, 
            img:"https://images.unsplash.com/photo-1598373182133-52452f7691ef?w=500",
            note:"La Farina di Segale assorbe molta acqua. Mixala con Manitoba.",
            base:{"Acqua tiepida (ml)":330, "Farina di Segale (g)":250, "Farina Manitoba (g)":250, "Sale (g)":10, "Lievito (g)":7}
        },
        {
            cat:"PANI", nome:"Pane alla Zucca", prog:1, 
            img:"https://images.unsplash.com/photo-1509440159596-0249088772ff?w=500",
            note:"Usa polpa di zucca COTTA al forno e schiacciata bene.",
            base:{"Purea Zucca cotta (g)":180, "Acqua (ml)":150, "Farina 0 (g)":450, "Sale (g)":8, "Lievito (g)":6}
        },
        {
            cat:"DOLCI", nome:"Brioche all'Uvetta", prog:5, 
            img:"https://images.unsplash.com/photo-1509440159596-0249088772ff?w=500",
            note:"Uvetta in ammollo, poi ASCIUGATA e INFARINATA prima del BIP.",
            base:{"Latte (ml)":150, "Uova (n)":2, "Farina Manitoba (g)":450, "Burro (g)":80, "Zucchero (g)":80, "Uvetta (g)":100, "Lievito (g)":7}
        },
        {
            cat:"DISPENSA", nome:"Confettura di Fichi", prog:17, 
            img:"https://images.unsplash.com/photo-1502741224143-90386d7f8c82?w=500",
            note:"Fichi sbucciati. Aggiungi i gherigli di noci a fine cottura.",
            base:{"Fichi puliti (g)":600, "Zucchero (g)":180, "Succo Limone (n)":1}
        }
    ];

    let currentRecipe = null;

    function init() {
        const pList = document.getElementById('prog-list');
        manuale.forEach(p => {
            pList.innerHTML += `<div class="prog-card"><div class="prog-title">${p.n} - ${p.t}</div><div style="font-size:0.8rem;">${p.d}</div></div>`;
        });
        renderIndex();
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        document.getElementById('btn-' + (v==='list'?'categories':v)).classList.add('active');
        window.scrollTo(0,0);
    }

    function filterCat(c) {
        const container = document.getElementById('recipe-list-container');
        container.innerHTML = "";
        ricette.filter(r => r.cat === c).forEach(r => {
            container.innerHTML += `
                <div class="recipe-item" onclick="openRecipe('${r.nome}')">
                    <img src="${r.img}">
                    <strong>${r.nome}</strong>
                </div>`;
        });
        showView('list');
    }

    function openRecipe(nome) {
        currentRecipe = ricette.find(r => r.nome === nome);
        document.getElementById('m-img').src = currentRecipe.img;
        document.getElementById('m-title').innerText = currentRecipe.nome;
        document.getElementById('m-prog').innerText = "Programma Girmi: " + currentRecipe.prog;
        document.getElementById('m-notes').innerText = "Consiglio: " + currentRecipe.note;
        
        // Reset scale buttons
        document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.scale-btn')[1].classList.add('active');
        
        renderIngredients(1);
        document.getElementById('recipe-modal').style.display = 'block';
    }

    function renderIngredients(factor, btn) {
        if(btn) {
            document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const container = document.getElementById('m-ingredients');
        container.innerHTML = "";
        for (let [ing, quant] of Object.entries(currentRecipe.base)) {
            let finalQuant = typeof quant === 'number' ? Math.round(quant * factor) : quant;
            container.innerHTML += `<div class="ing-row"><span>${ing}</span><span class="ing-qty">${finalQuant}</span></div>`;
        }
    }

    function closeRecipe() { document.getElementById('recipe-modal').style.display = 'none'; }

    function renderIndex() {
        const container = document.getElementById('index-list');
        ricette.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(r => {
            container.innerHTML += `
                <div class="recipe-item" onclick="openRecipe('${r.nome}')">
                    <img src="${r.img}">
                    <div><strong>${r.nome}</strong><br><small>${r.cat}</small></div>
                </div>`;
        });
    }

    function doSearch() {
        let term = document.getElementById('searchInput').value.toLowerCase();
        let items = document.querySelectorAll('#index-list .recipe-item');
        items.forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
        });
    }

    init();
</script>
</body>
</html>
