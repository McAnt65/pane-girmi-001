<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Forno di Mauro e Francesca</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/papercut/512/bread.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/papercut/512/bread.png">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #C5A059; 
            --dark: #3E362E; 
            --cream: #FAF7F2; 
            --accent: #8D775F; 
            --white: #ffffff; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--cream); 
            color: var(--dark); 
            margin: 0; 
            padding-bottom: 90px; 
            font-weight: 300;
        }

        header { 
            background: var(--white);
            padding: 40px 15px; 
            text-align: center; 
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .logo-text { font-family: 'Libre Baskerville', serif; font-size: 1.8rem; margin: 0; font-weight: 400; font-style: italic; }
        .vintage-line { width: 60px; height: 1px; background: var(--gold); margin: 20px auto 0; }

        /* Navigazione */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { color: var(--dark); font-size: 0.6rem; text-align: center; cursor: pointer; border: none; background: none; flex: 1; opacity: 0.4; letter-spacing: 1px; }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: 400; }

        .view { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Card Ricetta */
        .recipe-row { 
            background: var(--white); padding: 12px; margin-bottom: 10px; 
            display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; 
        }
        .thumb-list { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; margin-right: 15px; border: 1px solid #eee; }

        /* Modale */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(250, 247, 242, 0.98); z-index: 3000; justify-content: center; align-items: center; padding: 15px; }
        .modal { background: var(--white); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--gold); position: relative; }
        
        .recipe-hero { width: 100%; height: 220px; object-fit: cover; border-bottom: 1px solid var(--gold); filter: sepia(20%) contrast(1.1); }
        .modal-content { padding: 25px; }

        .btn-scale { flex: 1; padding: 12px; border: 1px solid var(--gold); background: white; font-size: 0.7rem; color: var(--gold); }
        .btn-scale.active { background: var(--gold); color: white; }
        
        .ing-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dotted #ddd; font-size: 0.85rem; }
        
        /* Home Card */
        .prog-card { background: var(--white); padding: 20px; margin-bottom: 15px; border: 1px solid #f0f0f0; }

        #idxSearch { width: 100%; padding: 15px; border: none; border-bottom: 1px solid var(--gold); background: transparent; margin-bottom: 20px; font-family: inherit; }
    </style>
</head>
<body>

<header>
    <div class="logo-subtitle" style="font-size: 0.6rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; color: var(--gold); text-align: center;">Ricettario Illustrato</div>
    <h1 class="logo-text" style="text-align: center;">Il Forno di<br>Mauro e Francesca</h1>
    <div class="vintage-line"></div>
</header>

<div id="view-home" class="view active">
    <div id="prog-list"></div>
</div>

<div id="view-categories" class="view">
    <div id="cat-container"></div>
</div>

<div id="view-list" class="view">
    <button onclick="showView('categories')" style="background:none; border:none; color:var(--gold); margin-bottom:20px; font-size:0.7rem; cursor:pointer;">← SEZIONI</button>
    <h2 id="list-title" style="font-family:'Libre Baskerville'; font-weight: 400; margin:0 0 25px 0;"></h2>
    <div id="list-container"></div>
</div>

<div id="view-index" class="view">
    <input type="text" id="idxSearch" placeholder="Cerca ricetta..." onkeyup="searchIndex()">
    <div id="full-index"></div>
</div>

<div id="modal-recipe" class="overlay">
    <div class="modal">
        <button onclick="closeModals()" style="position:absolute; top:15px; right:15px; border:none; background:rgba(255,255,255,0.8); width:35px; height:35px; border-radius:50%; font-size:1.2rem; color:var(--gold); z-index:10; cursor:pointer;">✕</button>
        <img id="r-img" class="recipe-hero" src="" alt="Foto Ricetta">
        
        <div class="modal-content">
            <h2 id="r-name" style="font-family:'Libre Baskerville'; font-weight:400; margin:0 0 5px 0;"></h2>
            <div id="r-prog-badge" style="font-size:0.6rem; letter-spacing:2px; color:var(--gold); text-transform:uppercase; margin-bottom:20px;"></div>
            
            <div style="display:flex; margin-bottom:25px;" id="scale-controls">
                <button class="btn-scale" id="s500" onclick="scale(0.66, this)">500G</button>
                <button class="btn-scale active" id="s750" onclick="scale(1, this)">750G</button>
                <button class="btn-scale" id="s1000" onclick="scale(1.33, this)">1KG</button>
            </div>

            <div id="r-ingredients"></div>
            <div id="r-notes" style="font-size:0.8rem; margin-top:20px; padding-top:15px; border-top:1px solid #eee; font-style:italic; color:var(--accent);"></div>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" id="n-home" onclick="showView('home')">MANUALE</button>
    <button class="nav-item" id="n-categories" onclick="showView('categories')">RICETTARIO</button>
    <button class="nav-item" id="n-index" onclick="showView('index')">INDICE</button>
</nav>

<script>
    const manuale = [
        {n:1, t:"Pane Base", d:"Per farine 0 e 00. Ciclo standard.", time:"3:00"},
        {n:3, t:"Integrale", d:"Per farine grezze. Riscaldamento lungo.", time:"3:40"},
        {n:5, t:"Dolce", d:"Per brioche e impasti ricchi di burro.", time:"2:55"},
        {n:12, t:"Mix Speciale", d:"Per pane con aggiunte al segnale BIP.", time:"3:00"},
        {n:17, t:"Marmellata", d:"Cuoce e mescola frutta e zucchero.", time:"1:20"}
    ];

    const database = [
        {
            cat:"PANI", 
            nome:"Pane Bianco di Mauro", 
            prog:1, 
            img: "https://images.unsplash.com/photo-1589367920969-ab8e050bab0e?auto=format&fit=crop&w=600&q=80",
            note:"Il classico quotidiano. Crosta croccante e interno soffice.", 
            base:{"Acqua (ml)":280, "Farina Tipo 0 (g)":480, "Olio EVO (g)":20, "Sale (g)":9, "Lievito Secco (g)":5}
        },
        {
            cat:"PANI", 
            nome:"Pane al Finocchietto", 
            prog:12, 
            img: "https://images.unsplash.com/photo-1549931319-a545dcf3bc73?auto=format&fit=crop&w=600&q=80",
            note:"Tosta i semi in padella per 2 min prima del BIP.", 
            base:{"Acqua (ml)":280, "Farina Tipo 0 (g)":480, "Semi finocchio tostati (g)":12, "Sale (g)":9, "Lievito (g)":5}
        },
        {
            cat:"PANI", 
            nome:"Pane alla Zucca", 
            prog:1, 
            img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=600&q=80",
            note:"Usa purea di zucca cotta al forno. Colore stupendo.", 
            base:{"Purea Zucca cotta (g)":180, "Acqua (ml)":150, "Farina 0 (g)":450, "Sale (g)":8, "Lievito (g)":6}
        },
        {
            cat:"DOLCI", 
            nome:"Brioche all'Uvetta", 
            prog:5, 
            img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=600&q=80",
            note:"Francesca suggerisce di infarinare l'uvetta prima del BIP.", 
            base:{"Latte (ml)":150, "Uova (n)":2, "Farina Manitoba (g)":450, "Burro (g)":80, "Uvetta (g)":100, "Lievito (g)":7}
        },
        {
            cat:"DISPENSA", 
            nome:"Confettura di Fichi", 
            prog:17, 
            img: "https://images.unsplash.com/photo-1502741224143-90386d7f8c82?auto=format&fit=crop&w=600&q=80",
            note:"Fichi sbucciati e zenzero fresco. Ottima con i formaggi.", 
            base:{"Fichi puliti (g)":600, "Zucchero (g)":180, "Succo Limone (n)":1}
        }
    ];

    function init() {
        // Popola Home
        const pList = document.getElementById('prog-list');
        manuale.forEach(p => {
            pList.innerHTML += `<div class="prog-card"><strong>${p.n} - ${p.t}</strong><p style="font-size:0.8rem; margin:5px 0;">${p.d}</p><small>${p.time}</small></div>`;
        });

        // Popola Categorie
        const cats = [{id:"PANI", n:"I Pani", i:"🍞"}, {id:"DOLCI", n:"I Dolci", i:"🍰"}, {id:"DISPENSA", n:"Dispensa", i:"🏺"}];
        const cCont = document.getElementById('cat-container');
        cats.forEach(c => {
            cCont.innerHTML += `<div class="cat-card" onclick="openCat('${c.id}')"><span style="font-size:1.5rem; margin-right:15px">${c.i}</span><strong>${c.n}</strong></div>`;
        });
        
        renderFullIndex();
    }

    function openCat(catId) {
        document.getElementById('list-title').innerText = catId;
        const cont = document.getElementById('list-container');
        cont.innerHTML = "";
        database.filter(r => r.cat === catId).forEach(r => {
            cont.innerHTML += `
                <div class="recipe-row" onclick="openRecipe('${r.nome}')">
                    <img class="thumb-list" src="${r.img || 'https://loremflickr.com/100/100/bread'}">
                    <strong>${r.nome}</strong>
                </div>`;
        });
        showView('list');
    }

    let currentR = null;
    function openRecipe(name) {
        currentR = database.find(x => x.nome === name);
        if(!currentR) return;
        
        document.getElementById('r-img').src = currentR.img || `https://loremflickr.com/500/300/${currentR.nome.split(' ')[0]}`;
        document.getElementById('r-name').innerText = currentR.nome;
        document.getElementById('r-prog-badge').innerText = "PROG. " + currentR.prog;
        document.getElementById('r-notes').innerHTML = currentR.note;
        
        scale(1, document.getElementById('s750'));
        document.getElementById('modal-recipe').style.display = 'flex';
    }

    function scale(f, btn) {
        document.querySelectorAll('.btn-scale').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cont = document.getElementById('r-ingredients');
        cont.innerHTML = "";
        for (let [i, q] of Object.entries(currentR.base)) {
            let val = typeof q === 'number' ? Math.round(q * f) : q;
            cont.innerHTML += `<div class="ing-line"><span>${i}</span><strong>${val}</strong></div>`;
        }
    }

    function renderFullIndex() {
        const cont = document.getElementById('full-index');
        cont.innerHTML = "";
        database.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(r => {
            cont.innerHTML += `
                <div class="recipe-row" onclick="openRecipe('${r.nome}')">
                    <img class="thumb-list" src="${r.img || 'https://loremflickr.com/100/100/bread'}">
                    <div><strong>${r.nome}</strong><br><small>${r.cat}</small></div>
                </div>`;
        });
    }

    function searchIndex() {
        let s = document.getElementById('idxSearch').value.toLowerCase();
        let rows = document.querySelectorAll('#full-index .recipe-row');
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(s) ? 'flex' : 'none');
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('n-' + (v === 'list' ? 'categories' : v)).classList.add('active');
        window.scrollTo(0,0);
    }

    function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }

    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
