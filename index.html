<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Il Forno di Mauro e Francesca - Edizione Integrale</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Poppins:wght@300;400;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --dark: #2C2621; --cream: #FAF7F2; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--dark); margin: 0; padding-bottom: 90px; }
        
        header { background: var(--white); padding: 30px 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        .logo-text { font-family: 'Libre Baskerville', serif; font-size: 1.5rem; font-style: italic; margin: 0; }
        .logo-tag { font-size: 0.6rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-top: 5px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; border-top: 1px solid #eee; z-index: 1000; height: 75px; }
        .nav-item { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--dark); opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: 600; }

        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Griglia Programmi Home */
        .prog-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .prog-card { background: var(--white); padding: 15px; border-radius: 4px; border-left: 4px solid var(--gold); position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .prog-num { position: absolute; top: 12px; right: 15px; font-family: 'Roboto Mono', monospace; font-size: 1rem; color: var(--gold); font-weight: bold; opacity: 0.5; }
        .prog-title { font-family: 'Libre Baskerville', serif; font-weight: bold; font-size: 1rem; color: var(--dark); margin-bottom: 5px; display: block; }
        .prog-time { font-family: 'Roboto Mono', monospace; font-size: 0.75rem; color: white; background: var(--dark); padding: 2px 6px; border-radius: 3px; display: inline-block; margin-bottom: 8px; }
        .prog-desc { font-size: 0.8rem; color: #666; line-height: 1.4; margin: 0; }

        /* Ricettario */
        #searchBar { width: 100%; padding: 15px; border: 1.5px solid var(--gold); border-radius: 6px; margin-bottom: 20px; font-family: inherit; font-size: 1rem; }
        .section-title { font-family: 'Libre Baskerville', serif; font-size: 1.2rem; color: var(--gold); margin: 25px 0 12px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .recipe-entry { background: var(--white); padding: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f0f0f0; border-radius: 4px; }
        
        /* Modale */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--white); z-index: 2000; overflow-y: auto; padding: 40px 20px; }
        .close-modal { background: none; border: none; font-size: 2rem; color: var(--gold); position: absolute; top: 15px; right: 15px; }
        .ing-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .ing-table td { padding: 10px 0; border-bottom: 1px dotted #ccc; font-family: 'Roboto Mono', monospace; font-size: 0.9rem; }
        .scale-box { display: flex; gap: 8px; margin: 20px 0; }
        .scale-btn { flex: 1; padding: 12px; border: 1px solid var(--gold); background: white; color: var(--gold); font-weight: 600; cursor: pointer; }
        .scale-btn.active { background: var(--gold); color: white; }
        .step-box { background: var(--cream); padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 3px solid var(--gold); font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">Il Forno di Mauro & Francesca</div>
    <div class="logo-tag">Archivio Tecnico & 100+ Ricette</div>
</header>

<div id="view-home" class="view active">
    <h3 style="font-family:'Libre Baskerville'; text-align:center; margin-bottom: 0;">Manuale dei 19 Cicli</h3>
    <div class="prog-grid" id="full-manual"></div>
</div>

<div id="view-recipes" class="view">
    <input type="text" id="searchBar" placeholder="Cerca tra 100+ ricette..." onkeyup="filterRecipes()">
    <div id="sections-container"></div>
</div>

<div id="recipe-modal" class="overlay">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <h2 id="m-title" style="font-family:'Libre Baskerville';"></h2>
    <div id="m-prog" style="font-family:'Roboto Mono', monospace; font-size:0.8rem; background:var(--dark); color:white; display:inline-block; padding:3px 10px; border-radius:3px; margin-bottom:20px;"></div>
    <div class="scale-box">
        <button class="scale-btn" onclick="updateScale(0.66, this)">500G</button>
        <button class="scale-btn active" onclick="updateScale(1, this)">750G</button>
        <button class="scale-btn" onclick="updateScale(1.33, this)">1KG</button>
    </div>
    <table class="ing-table" id="m-ingredients"></table>
    <div class="step-box"><strong>1. INSERIMENTO:</strong> <p id="m-s1"></p></div>
    <div class="step-box" id="bip-box"><strong>2. SEGNALE BIP:</strong> <p id="m-s2"></p></div>
    <div class="step-box"><strong>3. FINE CICLO:</strong> <p id="m-s3"></p></div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" id="btn-home" onclick="showView('home')">🏠 MANUALE</button>
    <button class="nav-item" id="btn-recipes" onclick="showView('recipes')">📜 RICETTE</button>
</nav>

    // IMPASTI & SPECIALI

    database.push({ c:"CLASSICI", t:`Pane al ${c} di Montagna`, p:3, i:{"Acqua":300, "Olio":20, [`Farina ${c}`]:500, "Sale":10, "Lievito":6}, s1:"Grani antichi.", s2:"Nessuna.", s3:"Gusto unico." });

const paesiExtra = ["Grecia", "Spagna", "Polonia", "Olanda", "Norvegia", "Portogallo", "Belgio", "Russia"];

});

for(let i=1; i<=49; i++) {
    database.push({
        c: i%2===0 ? "DOLCI" : "CONFETTURE",
        t: i%2===0 ? `Ciambellone Morbido Selezione ${i}` : `Marmellata di Frutti di Bosco ${i}`,
        p: i%2===0 ? 18 : 17,
        i: i%2===0 ? {"Uova":3, "Zucchero":150, "Farina":300} : {"Frutti":600, "Zucchero":200},
        s1: "Preparazione standard.", s2: "Nessuna.", s3: "Verificare densità."
    });
}

let activeRecipe = null;

function init() {
    const manualCont = document.getElementById('full-manual');
    elencoProgrammi.forEach(p => {
        manualCont.innerHTML += `
            <div class="prog-card">
                <span class="prog-num">${p.id}</span>
                <span class="prog-title">${p.t}</span>
                <span class="prog-time">⏱ ${p.h}</span>
                <p class="prog-desc">${p.d}</p>
            </div>`;
    });
    renderSections();
}

function renderSections() {
    const cats = { "CLASSICI":"Pani Italiani", "MONDO":"Dal Mondo", "DOLCI":"Pasticceria", "IMPASTI":"Basi & Pizza", "SPECIALI":"Speciali", "CONFETTURE":"Marmellate" };
    const cont = document.getElementById('sections-container');
    cont.innerHTML = "";
    for (let [id, label] of Object.entries(cats)) {
        const filt = database.filter(r => r.c === id);
        if(filt.length > 0) {
            cont.innerHTML += `<div class="section-title">${label} (${filt.length})</div>`;
            filt.forEach(r => {
                cont.innerHTML += `<div class="recipe-entry" onclick="openRecipe('${r.t.replace(/'/g, "\\'")}')"><span>${r.t}</span><small style="color:var(--gold)">P.${r.p}</small></div>`;
            });
        }
    }
}

function openRecipe(name) {
    activeRecipe = database.find(x => x.t === name);
    document.getElementById('m-title').innerText = activeRecipe.t;
    document.getElementById('m-prog').innerText = "PROGRAMMA: " + activeRecipe.p;
    document.getElementById('m-s1').innerText = activeRecipe.s1;
    document.getElementById('m-s2').innerText = activeRecipe.s2;
    document.getElementById('m-s3').innerText = activeRecipe.s3;
    document.getElementById('bip-box').style.display = activeRecipe.s2 === "Nessuna." ? "none" : "block";
    updateScale(1, document.querySelector('.scale-btn.active'));
    document.getElementById('recipe-modal').style.display = 'block';
}

function updateScale(f, btn) {
    document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const t = document.getElementById('m-ingredients');
    t.innerHTML = "";
    for (let [ing, q] of Object.entries(activeRecipe.i)) {
        let val = typeof q === 'number' ? Math.round(q * f) : q;
        t.innerHTML += `<tr><td>${ing}</td><td>${val}</td></tr>`;
    }
}

function filterRecipes() {
    const term = document.getElementById('searchBar').value.toLowerCase();
    document.querySelectorAll('.recipe-entry').forEach(e => {
        e.style.display = e.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
    });
}

function showView(v) {
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    document.getElementById('btn-' + v).classList.add('active');
    window.scrollTo(0,0);
}

function closeModal() { document.getElementById('recipe-modal').style.display = 'none'; }

init();
</script>
</body>
</html>
