<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Forno di Mauro e Francesca - Home</title>
    <style>
        :root {
            --pergamena: #fdf5e6;
            --ottone: #8b6b23;
            --cuoio: #4b2b11;
            --testo: #5c3c1b;
        }

        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
        }

        .page-container {
            width: 360px;
            height: 640px;
            background: var(--pergamena);
            border: 10px solid var(--ottone);
            border-image: linear-gradient(45deg, #4e3a10, #b8860b, #4e3a10) 1;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.2), 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            display: flex;
            flex-direction: column;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header-banner {
            text-align: center;
            padding: 30px 10px;
            border-bottom: 2px double var(--ottone);
            margin: 0 20px;
        }

        .header-banner h1 {
            font-size: 22px;
            margin: 0;
            letter-spacing: 2px;
            color: var(--testo);
            text-transform: uppercase;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .illustration {
            width: 200px;
            height: 200px;
            background: url('https://img.icons8.com/plasticine/400/bread-machine.png') no-repeat center;
            background-size: contain;
            margin-bottom: 20px;
            filter: sepia(0.4);
        }

        .quote {
            font-style: italic;
            color: var(--testo);
            font-size: 16px;
            line-height: 1.4;
        }

        .leather-nav {
            background-color: var(--cuoio);
            border-top: 3px solid var(--ottone);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 10px 5px;
            gap: 5px;
        }

        .nav-btn {
            color: #d2b48c;
            text-decoration: none;
            font-size: 9px;
            font-weight: bold;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--ottone);
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .active-btn { color: #daa520; }
    </style>
</head>
<body>

    <div class="page-container">
        <header class="header-banner">
            <h1>IL FORNO DI<br>MAURO E FRANCESCA</h1>
        </header>

        <main class="main-content">
            <div class="illustration"></div>
            <p class="quote">"Non v'è amore più puro del calore di una casa che profuma di pane appena sfornato."</p>
        </main>

        <nav class="leather-nav">
            <a href="#" class="nav-btn">
                <div class="btn-circle">⚙</div>
                PROGRAMMI
            </a>
            <a href="guida.html" class="nav-btn active-btn">
                <div class="btn-circle">🧭</div>
                GUIDA MACCHINA
            </a>
            <a href="#" class="nav-btn">
                <div class="btn-circle">🌾</div>
                RICETTE
            </a>
        </nav>
    </div>

</body>
</html>
