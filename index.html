<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antico Forno Cantoni - Girmi MP20</title>
    <link rel="apple-touch-icon" href="https://img.icons8.com/?size=512&id=113061&format=png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #FDF5E6; --dark-wood: #4B3621; --flour: #FFFFFF; --crust: #C08552; --shadow: rgba(0,0,0,0.1); }
        body { font-family: 'Poppins', sans-serif; background-color: var(--cream); color: var(--dark-wood); margin: 0; padding-bottom: 80px; }
        header { background: var(--dark-wood); color: var(--cream); padding: 15px; text-align: center; border-bottom: 5px solid var(--crust); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--dark-wood); display: flex; justify-content: space-around; padding: 10px 0; border-top: 3px solid var(--crust); z-index: 1000; }
        .nav-item { color: var(--cream); font-size: 0.9rem; text-align: center; cursor: pointer; border: none; background: none; flex: 1; }
        .view { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .insegna-storica { text-align: center; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px var(--shadow); margin-bottom: 20px; border: 2px solid var(--crust); }
        .category-header { background: var(--crust); color: white; padding: 8px 15px; border-radius: 5px; margin: 20px 0 10px 0; font-family: 'Playfair Display', serif; font-size: 1.2rem; }
        .search-bar { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--crust); margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        .recipe-card { background: white; padding: 12px; border-radius: 10px; border-left: 5px solid var(--dark-wood); box-shadow: 0 2px 4px var(--shadow); margin-bottom: 10px; cursor: pointer; }
        #recipe-detail { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--cream); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .weight-selector { display: flex; gap: 8px; margin: 15px 0; }
        .weight-btn { flex: 1; padding: 12px; border: 1px solid var(--dark-wood); background: white; border-radius: 8px; font-weight: bold; }
        .weight-btn.active { background: var(--dark-wood); color: white; }
        .ingredients-box { background: white; padding: 15px; border-radius: 10px; border: 1px dashed var(--crust); margin: 15px 0; }
        .ing-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0; }
        .notes-area { width: 100%; height: 120px; padding: 10px; border-radius: 8px; border: 1px solid var(--crust); font-family: 'Poppins'; margin-top: 10px; box-sizing: border-box; background: #fff9f0; }
        .save-note-btn { background: var(--crust); color: white; border: none; padding: 12px; border-radius: 5px; margin-top: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header><h1 style="font-family: 'Playfair Display'; font-size: 1.2rem; margin:0;">ANTICO FORNO CANTONI</h1></header>

<div id="view-home" class="view active">
    <div class="insegna-storica">
        <h2 style="font-family: 'Playfair Display'; margin:0;">Tradizione Cantoni</h2>
        <p style="font-style: italic; color: var(--crust); margin: 5px 0 0;">Dal 1965 ad oggi</p>
    </div>
    <div style="background:white; padding:15px; border-radius:12px; border:1px solid var(--crust);">
        <strong>Benvenuto nel Diario Digitale</strong><br>
        <small>Tutte le ricette includono il dosaggio corretto del lievito e sono ottimizzate per i 19 programmi della tua Girmi MP20.</small>
    </div>
</div>

<div id="view-recipes" class="view">
    <input type="text" class="search-bar" id="searchInput" placeholder="Cerca ricetta o ingrediente..." onkeyup="filterRecipes()">
    <div id="recipeContainer"></div>
</div>

<div id="recipe-detail">
    <button onclick="closeDetail()" style="background:var(--dark-wood); color:white; padding:10px; border:none; border-radius:5px; margin-bottom:10px;">← TORNA ALLA LISTA</button>
    <h2 id="det-title" style="font-family: 'Playfair Display'; margin: 10px 0 5px 0;"></h2>
    <div id="det-prog" style="color: var(--crust); font-weight: bold; margin-bottom: 10px;"></div>
    
    <div class="weight-selector">
        <button class="weight-btn" id="w500" onclick="updateScale(0.66, this)">500g</button>
        <button class="weight-btn active" id="w750" onclick="updateScale(1, this)">750g</button>
        <button class="weight-btn" id="w1000" onclick="updateScale(1.33, this)">1000g</button>
    </div>
    
    <div class="ingredients-box" id="det-ingredients"></div>
    <p id="det-desc" style="font-style:italic; font-size:0.9rem; background:white; padding:10px; border-radius:8px; border-left:4px solid var(--crust);"></p>
    
    <div style="margin-top:20px;">
        <strong>Note del Fornaio:</strong>
        <textarea id="userNotes" class="notes-area" placeholder="Scrivi qui i tuoi segreti..."></textarea>
        <button class="save-note-btn" onclick="saveNote()">💾 SALVA APPUNTI</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item" onclick="showView('home')">🏠<br>Home</button>
    <button class="nav-item" onclick="showView('recipes')">🍞<br>Ricettario</button>
</nav>

<script>
    const ricette = [
        // PANI CLASSICI
        { cat: "Pani Classici", nome: "Pane Bianco Comune", prog: "1-NORMALE", desc: "Il pane di ogni giorno, croccante e semplice.", base: {"Acqua (ml)": 280, "Farina 0 (g)": 450, "Sale (g)": 8, "Lievito Secco (g)": 5} },
        { cat: "Pani Classici", nome: "Baguette Francese", prog: "2-FRANCESE", desc: "Crosta sottile e alveoli grandi.", base: {"Acqua (ml)": 320, "Farina Manitoba (g)": 450, "Sale (g)": 9, "Lievito Secco (g)": 4} },
        { cat: "Pani Classici", nome: "Pane al Latte", prog: "6-SANDWICH", desc: "Morbido, ideale per colazione o toast.", base: {"Latte (ml)": 300, "Farina 0 (g)": 500, "Burro (g)": 30, "Zucchero (g)": 10, "Lievito Secco (g)": 5} },
        { cat: "Pani Classici", nome: "Pane Veloce", prog: "4-VELOCE", desc: "Quando hai poco tempo (circa 2 ore).", base: {"Acqua tiepida (ml)": 280, "Farina 0 (g)": 450, "Sale (g)": 8, "Lievito Secco (g)": 8} },
        { cat: "Pani Classici", nome: "Pane all'Olio", prog: "1-NORMALE", desc: "Soffice e profumato.", base: {"Acqua (ml)": 250, "Olio EVO (ml)": 40, "Farina 0 (g)": 500, "Lievito Secco (g)": 5} },

        // PANI SPECIALI
        { cat: "Pani Speciali", nome: "Pane Integrale Puro", prog: "3-INTEGRALE", desc: "Ricco di fibre, lievitazione lunga.", base: {"Acqua (ml)": 310, "Farina Integrale (g)": 500, "Sale (g)": 10, "Lievito Secco (g)": 7} },
        { cat: "Pani Speciali", nome: "Pane di Segale", prog: "3-INTEGRALE", desc: "Pane nero nordico, molto nutriente.", base: {"Acqua (ml)": 300, "Farina Segale (g)": 250, "Farina 0 (g)": 250, "Lievito Secco (g)": 6} },
        { cat: "Pani Speciali", nome: "Pane ai 5 Cereali", prog: "3-INTEGRALE", desc: "Mix di farine e semi.", base: {"Acqua (ml)": 320, "Farina Cereali (g)": 500, "Lievito Secco (g)": 6} },
        { cat: "Pani Speciali", nome: "Pane alle Noci", prog: "12-MIX 2", desc: "Aggiungi le noci al segnale acustico (BIP).", base: {"Acqua (ml)": 290, "Farina 0 (g)": 450, "Noci (g)": 100, "Lievito Secco (g)": 5} },
        { cat: "Pani Speciali", nome: "Pane alle Olive", prog: "12-MIX 2", desc: "Usa olive snocciolate, aggiungi al BIP.", base: {"Acqua (ml)": 280, "Farina 0 (g)": 500, "Olive (g)": 80, "Lievito Secco (g)": 5} },
        { cat: "Pani Speciali", nome: "Pane alla Zucca", prog: "1-NORMALE", desc: "Usa purea di zucca cotta.", base: {"Zucca (g)": 200, "Acqua (ml)": 80, "Farina 0 (g)": 450, "Lievito Secco (g)": 5} },

        // DOLCI E BRIOCHE
        { cat: "Dolci e Brioche", nome: "Pan Brioche", prog: "5-BRIOCHE", desc: "Classico dolce da colazione.", base: {"Latte (ml)": 180, "Farina 00 (g)": 450, "Burro (g)": 60, "Uova": 1, "Zucchero (g)": 80, "Lievito Secco (g)": 7} },
        { cat: "Dolci e Brioche", nome: "Plumcake allo Yogurt", prog: "18-TORTA", desc: "Usa lievito chimico per dolci.", base: {"Yogurt (g)": 125, "Farina 00 (g)": 300, "Zucchero (g)": 150, "Uova": 3, "Lievito Chimico (bustina)": 1} },
        { cat: "Dolci e Brioche", nome: "Pane al Cioccolato", prog: "12-MIX 2", desc: "Aggiungi gocce di cioccolato fredde al BIP.", base: {"Latte (ml)": 250, "Farina 0 (g)": 450, "Gocce cioccolato (g)": 100, "Lievito Secco (g)": 5} },

        // IMPASTI E PIZZE
        { cat: "Impasti e Pizze", nome: "Impasto Pizza", prog: "10-PIZZA", desc: "Solo impasto e lievitazione. Poi stendi e cuoci in forno.", base: {"Acqua (ml)": 300, "Farina 0 (g)": 500, "Sale (g)": 10, "Olio (ml)": 20, "Lievito Secco (g)": 6} },
        { cat: "Impasti e Pizze", nome: "Impasto Focaccia", prog: "10-PIZZA", desc: "Molto idratato, ideale per teglia.", base: {"Acqua (ml)": 330, "Farina 0 (g)": 500, "Sale (g)": 10, "Lievito Secco (g)": 6} },

        // VARIANTI MACCHINA (Yogurt, Marmellate, Porridge, Scongela)
        { cat: "Funzioni Extra", nome: "Yogurt Naturale", prog: "15-YOGURT", desc: "Mantiene 40°C per 8 ore. Usa latte a temp. ambiente.", base: {"Latte Intero (ml)": 1000, "Yogurt Bianco (g)": 125} },
        { cat: "Funzioni Extra", nome: "Marmellata di Fragole", prog: "17-MARMELLATA", desc: "Frutta a pezzi piccoli e zucchero.", base: {"Fragole (g)": 500, "Zucchero (g)": 300, "Limone (succo)": 1} },
        { cat: "Funzioni Extra", nome: "Porridge di Avena", prog: "13-PORRIDGE", desc: "Colazione calda e cremosa.", base: {"Latte (ml)": 500, "Fiocchi d'Avena (g)": 100, "Miele (cucchiaio)": 1} },
        { cat: "Funzioni Extra", nome: "Scongelamento Pane", prog: "14-SCONGELA", desc: "Per pane surgelato, riscalda delicatamente.", base: {"Pane surgelato": "Inserire nel cestello"} }
    ];

    // Popolamento dinamico per arrivare a 100 varianti (logica automatica)
    const gustiVari = ["Curcuma", "Farro", "Kamut", "Rosmarino", "Cipolla", "Speck", "Mais", "Patate", "Birra", "Miele", "Semi di Girasole", "Semi di Papavero", "Fichi", "Arancia"];
    gustiVari.forEach((g, i) => {
        ricette.push({
            cat: "Pani Speciali",
            nome: "Pane al " + g + " Cantoni",
            prog: "1-NORMALE",
            desc: "Variante aromatica dell'Antico Forno.",
            base: {"Acqua (ml)": 280, "Farina (g)": 500, [g]: 50, "Sale (g)": 8, "Lievito Secco (g)": 5}
        });
    });

    let currentRecipe = null;

    function renderRecipes() {
        const container = document.getElementById('recipeContainer');
        container.innerHTML = "";
        const categories = [...new Set(ricette.map(r => r.cat))];
        
        categories.forEach(category => {
            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerText = category;
            container.appendChild(header);

            const filtered = ricette.filter(r => r.cat === category);
            filtered.forEach(r => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.onclick = () => openDetail(r);
                card.innerHTML = `<strong>${r.nome}</strong><br><small>Prog: ${r.prog}</small>`;
                container.appendChild(card);
            });
        });
    }

    function openDetail(r) {
        currentRecipe = r;
        document.getElementById('det-title').innerText = r.nome;
        document.getElementById('det-prog').innerText = "PROGRAMMA GIRMI: " + r.prog;
        document.getElementById('det-desc').innerText = r.desc;
        document.getElementById('userNotes').value = localStorage.getItem('note_' + r.nome) || "";
        updateScale(1, document.getElementById('w750'));
        document.getElementById('recipe-detail').style.display = 'block';
    }

    function updateScale(f, b) {
        document.querySelectorAll('.weight-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        const box = document.getElementById('det-ingredients');
        box.innerHTML = "";
        for (let [ing, qta] of Object.entries(currentRecipe.base)) {
            let cal = (typeof qta === 'number') ? Math.round(qta * f) : qta;
            box.innerHTML += `<div class="ing-row"><span>${ing}</span><strong>${cal}</strong></div>`;
        }
    }

    function saveNote() {
        if(currentRecipe) {
            localStorage.setItem('note_' + currentRecipe.nome, document.getElementById('userNotes').value);
            alert("Appunti salvati!");
        }
    }

    function filterRecipes() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('recipe-card');
        for (let card of cards) {
            card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
        }
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
    }

    function closeDetail() { document.getElementById('recipe-detail').style.display = 'none'; }
    
    renderRecipes();
</script>
</body>
</html>
