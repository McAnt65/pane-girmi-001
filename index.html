<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Il Forno di M&F</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #1a0d00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4e342e;
        }

        .smartphone {
            width: 360px;
            height: 640px;
            background: #e6c9a8;
            /* Effetto carta bruciata e macchiata */
            background-image: 
                radial-gradient(circleAt 50% 50%, transparent 50%, rgba(78,52,46,0.3) 100%),
                url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            border: 10px solid #8b6b23;
            box-shadow: inset 0 0 100px #8b6b2366, 0 0 50px black;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-label {
            font-size: 9px;
            text-align: center;
            padding: 5px;
            background: rgba(0,0,0,0.05);
            letter-spacing: 1px;
            font-family: sans-serif;
        }

        /* Il box del titolo con le "ali" del tuo bozzetto */
        .title-box {
            margin: 30px auto 10px;
            padding: 10px 20px;
            border: 2px solid #5d4037;
            position: relative;
            text-align: center;
            width: fit-content;
        }

        .title-box::before, .title-box::after {
            content: "❦"; /* Simbolo decorativo per le volute */
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            color: #8b6b23;
        }
        .title-box::before { left: -35px; }
        .title-box::after { right: -35px; }

        .title-box h1 {
            font-family: 'UnifrakturMaguntia', cursive;
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .illustration {
            flex-grow: 1;
            background: url('https://img.icons8.com/ios/250/5d4037/bread-machine.png') no-repeat center;
            background-size: 200px;
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.3)) sepia(0.5);
            margin: 20px 0;
        }

        .quote {
            font-family: 'Crimson Text', serif;
            font-style: italic;
            font-size: 18px;
            padding: 0 40px;
            text-align: center;
            line-height: 1.3;
        }

        .rif-lista {
            font-size: 10px;
            text-align: right;
            padding: 0 20px 100px;
        }

        /* Navigazione in cuoio */
        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90px;
            background: #3e2723;
            border-top: 3px solid #8b6b23;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
        }

        .nav-item {
            text-align: center;
            text-decoration: none;
            color: #d2b48c;
            font-size: 10px;
            font-weight: bold;
            font-family: 'Crimson Text', serif;
        }

        .nav-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #8b6b23;
            margin: 0 auto 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #4e342e;
            box-shadow: inset 2px 2px 5px black;
        }

        .active .nav-circle {
            background: #8b6b23;
            color: #3e2723;
            box-shadow: 0 0 15px #daa520;
        }
    </style>
</head>
<body>
    <div class="smartphone">
        <div class="top-label">BOZZETTI HOME PAGE - USO INTERNO - PAG. 1</div>
        
        <div class="title-box">
            <h1>Il Forno di<br>Mauro e Francesca</h1>
        </div>

        <div class="illustration"></div>

        <p class="quote">"Non v'è amore più puro del calore di una casa che profuma di pane appena sfornato."</p>
        
        <div class="rif-lista">RIF. LISTA 1</div>

        <nav class="nav-bar">
            <a href="#" class="nav-item">
                <div class="nav-circle">⚙</div>PROGRAMMI
            </a>
            <a href="guida.html" class="nav-item">
                <div class="nav-circle">🧭</div>GUIDA
            </a>
            <a href="#" class="nav-item">
                <div class="nav-circle">🌾</div>RICETTE
            </a>
        </nav>
    </div>
</body>
</html>
