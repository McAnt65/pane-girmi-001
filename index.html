<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Il Forno di Mauro e Francesca - Edizione Definitiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Poppins:wght@300;400;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --dark: #2C2621; --cream: #FAF7F2; --white: #ffffff; --text: #4A443F; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--dark); margin: 0; padding-bottom: 90px; }
        
        header { background: var(--white); padding: 30px 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        .logo-text { font-family: 'Libre Baskerville', serif; font-size: 1.5rem; font-style: italic; margin: 0; }
        .logo-tag { font-size: 0.6rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-top: 5px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; border-top: 1px solid #eee; z-index: 1000; height: 75px; }
        .nav-item { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; color: var(--dark); opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: 600; }

        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .prog-card { background: var(--white); padding: 15px; border-radius: 8px; border-left: 5px solid var(--gold); position: relative; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .prog-title { font-family: 'Libre Baskerville', serif; font-weight: bold; color: var(--dark); display: block; }
        .prog-time { font-family: 'Roboto Mono', monospace; font-size: 0.75rem; background: var(--dark); color: white; padding: 2px 6px; border-radius: 3px; }

        #searchBar { width: 100%; padding: 15px; border: 2px solid var(--gold); border-radius: 8px; margin-bottom: 20px; font-size: 1rem; outline: none; }
        .section-title { font-family: 'Libre Baskerville', serif; font-size: 1.2rem; color: var(--gold); margin: 30px 0 10px; border-bottom: 1px solid #ddd; }
        .recipe-entry { background: var(--white); padding: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; border: 1px solid #eee; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--white); z-index: 2000; overflow-y: auto; padding: 30px 20px; }
        .close-modal { background: var(--cream); border: none; font-size: 1.5rem; position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; border-radius: 50%; color: var(--gold); }
        .step-box { background: var(--cream); padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .step-label { font-weight: bold; font-size: 0.7rem; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .ing-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-family: 'Roboto Mono', monospace; font-size: 0.9rem; }
        .ing-table td { padding: 8px 0; border-bottom: 1px solid #eee; }
        .ing-table td:last-child { text-align: right; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">Il Forno di Mauro & Francesca</div>
    <div class="logo-tag">Archivio Tecnico 105 Ricette</div>
</header>

<div id="view-home" class="view active">
    <h3 style="text-align:center; font-family:'Libre Baskerville';">I 19 Programmi Girmi</h3>
    <div id="manual-list"></div>
</div>

<div id="view-recipes" class="view">
    <input type="text" id="searchBar" placeholder="Cerca tra 105 ricette reali..." onkeyup="filterRecipes()">
    <div id="sections-container"></div>
</div>

<div id="recipe-modal" class="overlay">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <h2 id="m-title" style="font-family:'Libre Baskerville'; margin-top: 30px;"></h2>
    <div id="m-prog" style="background:var(--dark); color:white; padding:4px 10px; display:inline-block; border-radius:4px; font-size:0.8rem; margin-bottom:20px;"></div>
    
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="scale-btn" style="flex:1; padding:10px; border:1px solid var(--gold); background:white;" onclick="updateScale(0.66, this)">500g</button>
        <button class="scale-btn active" style="flex:1; padding:10px; border:1px solid var(--gold); background:var(--gold); color:white;" onclick="updateScale(1, this)">750g</button>
        <button class="scale-btn" style="flex:1; padding:10px; border:1px solid var(--gold); background:white;" onclick="updateScale(1.33, this)">1kg</button>
    </div>

    <table class="ing-table" id="m-ingredients"></table>
    <div class="step-box"><span class="step-label">1. Preparazione</span><p id="m-s1" style="font-size:0.85rem; line-height:1.5;"></p></div>
    <div class="step-box" id="bip-box"><span class="step-label">2. Segnale BIP</span><p id="m-s2" style="font-size:0.85rem; line-height:1.5;"></p></div>
    <div class="step-box"><span class="step-label">3. Finitura</span><p id="m-s3" style="font-size:0.85rem; line-height:1.5;"></p></div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" id="btn-home" onclick="showView('home')">📖 MANUALE</button>
    <button class="nav-item" id="btn-recipes" onclick="showView('recipes')">🥐 RICETTE</button>

function init() {
    const list = document.getElementById('manual-list');
    programmi.forEach(p => {
        list.innerHTML += `<div class="prog-card"><span class="prog-time">P.${p.id}</span> <span class="prog-title">${p.t} - ${p.h}</span><p style="font-size:0.8rem; margin:5px 0 0 0; color:#666;">${p.d}</p></div>`;
    });
    renderRecipes();
}

function renderRecipes() {
    const cont = document.getElementById('sections-container');
    cont.innerHTML = "";
    const cats = ["PANI ITALIANI", "DAL MONDO", "PASTICCERIA", "MARMELLATE"];

        cont.innerHTML += `<div class="section-title">${c} (${filt.length})</div>`;
        filt.forEach(r => {
            cont.innerHTML += `<div class="recipe-entry" onclick="openRecipe('${r.t.replace(/'/g, "\\'")}')"><span>${r.t}</span><small>Prog. ${r.p}</small></div>`;
        });
    });
}

function openRecipe(name) {
    activeRecipe = ricette.find(x => x.t === name);
    document.getElementById('m-title').innerText = activeRecipe.t;
    document.getElementById('m-prog').innerText = "PROGRAMMA: " + activeRecipe.p;
    document.getElementById('m-s1').innerText = activeRecipe.s1;
    document.getElementById('m-s2').innerText = activeRecipe.s2;
    document.getElementById('m-s3').innerText = activeRecipe.s3;
    document.getElementById('bip-box').style.display = activeRecipe.s2 === "Nessuna." ? "none" : "block";
    updateScale(1, document.querySelector('.scale-btn.active'));
    document.getElementById('recipe-modal').style.display = 'block';
}

function updateScale(f, btn) {
    document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    btn.style.background = "var(--gold)"; btn.style.color = "white";
    const t = document.getElementById('m-ingredients');
    t.innerHTML = "";
    for (let [ing, q] of Object.entries(activeRecipe.i)) {
        let val = typeof q === 'number' ? Math.round(q * f) : q;
        t.innerHTML += `<tr><td>${ing}</td><td>${val}</td></tr>`;
    }
}

function filterRecipes() {
    const term = document.getElementById('searchBar').value.toLowerCase();
    document.querySelectorAll('.recipe-entry').forEach(e => {
        e.style.display = e.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
    });
}

function showView(v) {
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    document.getElementById('btn-' + v).classList.add('active');
}

function closeModal() { document.getElementById('recipe-modal').style.display = 'none'; }

init();
</script>
</body>
</html>
