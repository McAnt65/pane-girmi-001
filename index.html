<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmi Girmi MP20</title>
    <style>
        /* Stessi stili della Home per coerenza grafica */
        :root { --pergamena: #f4e4bc; --ottone: #8b6b23; --cuoio: #5d4037; --testo: #3e2723; }
        body { margin: 0; background-color: #1a0f00; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; }
        .phone-container { width: 360px; height: 640px; background: var(--pergamena); border: 10px solid var(--ottone); border-radius: 25px; display: flex; flex-direction: column; overflow: hidden; background-image: radial-gradient(circle, #f4e4bc 50%, #d2b48c 100%); }
        
        .header { padding: 20px; text-align: center; border-bottom: 2px solid var(--ottone); background: rgba(0,0,0,0.03); }
        .header h2 { font-size: 18px; margin: 0; color: var(--testo); text-transform: uppercase; }

        .program-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .program-item {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.3);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 5px;
            border-left: 4px solid var(--cuoio);
            color: var(--testo);
            font-size: 14px;
        }

        .num { font-weight: bold; margin-right: 15px; color: var(--ottone); font-size: 18px; }

        .home-link {
            display: block;
            text-align: center;
            padding: 15px;
            background: var(--cuoio);
            color: var(--pergamena);
            text-decoration: none;
            font-weight: bold;
            border-top: 2px solid var(--ottone);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <header class="header">
            <h2>I Programmi Girmi MP20</h2>
        </header>

        <div class="program-list">
            <div class="program-item"><span class="num">1</span> BASE</div>
            <div class="program-item"><span class="num">2</span> FRANCESE</div>
            <div class="program-item"><span class="num">3</span> INTEGRALE</div>
            <div class="program-item"><span class="num">4</span> VELOCE</div>
            <div class="program-item"><span class="num">5</span> DOLCE</div>
            <div class="program-item"><span class="num">6</span> ULTRA RAPIDO I</div>
            <div class="program-item"><span class="num">7</span> ULTRA RAPIDO II</div>
            <div class="program-item"><span class="num">8</span> IMPASTO</div>
            <div class="program-item"><span class="num">9</span> MARMELLATA</div>
            <div class="program-item"><span class="num">10</span> TORTA</div>
            <div class="program-item"><span class="num">11</span> SANDWICH</div>
            <div class="program-item"><span class="num">12</span> COTTURA</div>
        </div>

        <a href="index.html" class="home-link">TORNA ALLA HOME</a>
    </div>

</body>
</html>
