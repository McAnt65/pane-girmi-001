<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Macchina - Il Forno</title>
    <style>
        :root {
            --color-vintage: #2e1a12;
            --bg-pergamena: #f4e4bc;
        }

        body { 
            margin: 0; 
            background: #1a0f00; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Georgia', serif; 
        }
        
        .schermo-telefono {
            width: 360px;
            height: 640px;
            /* Inserisci qui il nome esatto dell'immagine di sfondo della Pag. 2 */
            background-image: url('sfondo_pag2.jpg'); 
            background-size: cover;
            background-position: center;
            position: relative;
            border: 4px solid #5d4037;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Navigazione Inferiore (Tastoni Luminosi) */
        .footer-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
        }

        .tastoni-wrap {
            display: flex;
            justify-content: space-around;
            width: 95%;
            margin-bottom: 10px;
        }

        .tasto-pelle {
            width: 100px;
            height: 70px;
            background: #6d4c41;
            border: 2px solid #3e2723;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        /* Effetto Luminoso per pagina Attuale (Pag. 2 = Guida) */
        .tasto-pelle.active {
            background: #8d6e63;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.2), 0 0 15px rgba(212,175,55,0.4);
            border-color: #d4af37;
        }

        .tasto-pelle span { 
            font-size: 9px; 
            font-weight: bold; 
            text-align: center; 
            text-transform: uppercase; 
        }

        .btn-home {
            background: rgba(62, 39, 35, 0.8);
            color: #d4af37;
            padding: 5px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 11px;
            border: 1px solid #d4af37;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="schermo-telefono">
        
        <div class="footer-nav">
            <div class="tastoni-wrap">
                <a href="programmi.html" class="tasto-pelle">
                    <span>Programmi</span>
                </a>
                
                <a href="guida.html" class="tasto-pelle active">
                    <span>Guida Macchina</span>
                </a>
                
                <a href="ricette.html" class="tasto-pelle">
                    <span>Ricette</span>
                </a>
            </div>
            <a href="index.html" class="btn-home">Torna alla Home</a>
        </div>
        
    </div>

</body>
</html>
