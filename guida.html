<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Macchina - Il Forno</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            padding: 0;
            background: #1a0f00; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
        }
        
        .schermo-telefono {
            width: 360px;
            height: 640px;
            /* L'immagine deve chiamarsi sfondo_pag2.jpg */
            background-image: url('sfondo_pag2.jpg'); 
            background-size: 100% 100%;
            background-position: center;
            position: relative;
            border: 4px solid #5d4037;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Area generica per i link trasparenti */
        .mappa-tasti a {
            position: absolute;
            display: block;
            text-decoration: none;
            /* debug: background: rgba(255, 0, 0, 0.4); <- Attiva per vedere le aree rosse */
        }

        /* Tasto PROGRAMMI (Sinistra) */
        .btn-programmi {
            width: 105px;
            height: 75px;
            bottom: 68px;
            left: 10px;
        }

        /* Tasto GUIDA MACCHINA (Centro - Già luminoso nel disegno) */
        .btn-guida {
            width: 110px;
            height: 80px;
            bottom: 72px;
            left: 125px;
        }

        /* Tasto RICETTE (Destra) */
        .btn-ricette {
            width: 105px;
            height: 75px;
            bottom: 68px;
            right: 10px;
        }

        /* Targa TORNA ALLA HOME (In fondo) */
        .btn-home {
            width: 220px;
            height: 45px;
            bottom: 12px;
            left: 70px;
        }

        /* Effetto feedback visivo al tocco */
        .mappa-tasti a:active {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

    </style>
</head>
<body>

    <div class="schermo-telefono">
        <nav class="mappa-tasti">
            <a href="programmi.html" class="btn-programmi" title="Vai ai Programmi"></a>
            <a href="guida.html" class="btn-guida" title="Pagina Corrente"></a>
            <a href="ricette.html" class="btn-ricette" title="Vai alle Ricette"></a>
            <a href="index.html" class="btn-home" title="Torna alla Home"></a>
        </nav>
    </div>

</body>
</html>
