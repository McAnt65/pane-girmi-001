<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Macchina - Il Forno</title>
    <style>
        body { 
            margin: 0; 
            background: #1a0f00; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Georgia', serif; 
        }
        
        .schermo-telefono {
            width: 360px;
            height: 640px;
            /* Salva l'immagine sopra come sfondo_pag2.jpg */
            background-image: url('sfondo_pag2.jpg'); 
            background-size: cover;
            background-position: center;
            position: relative;
            border: 4px solid #5d4037;
            border-radius: 15px;
            overflow: hidden;
        }

        /* Navigazione Inferiore */
        .footer-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
        }

        .tastoni-wrap {
            display: flex;
            justify-content: space-around;
            width: 95%;
            margin-bottom: 8px;
        }

        .tasto-pelle {
            width: 95px;
            height: 65px;
            background: #6d4c41;
            border: 2px solid #3e2723;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 4px 6px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        /* Tasto GUIDA attivo e luminoso */
        .tasto-pelle.active {
            background: #8d6e63;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.2), 0 0 15px rgba(212,175,55,0.5);
            border-color: #d4af37;
        }

        .tasto-pelle span { 
            font-size: 9px; 
            font-weight: bold; 
            text-align: center; 
            text-transform: uppercase;
            color: #f4e4bc;
        }

        .btn-home {
            background: rgba(62, 39, 35, 0.8);
            color: #d4af37;
            padding: 4px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 10px;
            border: 1px solid #d4af37;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="schermo-telefono">
        <div class="footer-nav">
            <div class="tastoni-wrap">
                <a href="programmi.html" class="tasto-pelle"><span>Programmi</span></a>
                <a href="guida.html" class="tasto-pelle active"><span>Guida Macchina</span></a>
                <a href="ricette.html" class="tasto-pelle"><span>Ricette</span></a>
            </div>
            <a href="index.html" class="btn-home">Torna alla Home</a>
        </div>
    </div>

</body>
</html>
