<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Macchina - Il Forno</title>
    <style>
        body { 
            margin: 0; 
            background: #1a0f00; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .schermo-telefono {
            width: 360px;
            height: 640px;
            /* Assicurati che l'immagine caricata si chiami sfondo_pag2.jpg */
            background-image: url('sfondo_pag2.jpg'); 
            background-size: 100% 100%;
            position: relative;
            border: 4px solid #5d4037;
            border-radius: 15px;
            overflow: hidden;
        }

        /* Area dei tasti invisibili sovrapposti al disegno */
        .area-link {
            position: absolute;
            cursor: pointer;
            /* debug: background: rgba(255,0,0,0.3); <- Togli il commento per vedere dove sono le aree */
        }

        /* Posizionamento basato sull'immagine della Pagina 1/2 */
        .link-programmi {
            width: 30%;
            height: 12%;
            bottom: 12%;
            left: 3%;
        }

        .link-guida {
            width: 30%;
            height: 12%;
            bottom: 12%;
            left: 35%;
        }

        .link-ricette {
            width: 30%;
            height: 12%;
            bottom: 12%;
            right: 3%;
        }

        .link-home {
            width: 60%;
            height: 6%;
            bottom: 3%;
            left: 20%;
        }
    </style>
</head>
<body>

    <div class="schermo-telefono">
        <a href="programmi.html" class="area-link link-programmi"></a>
        <a href="guida.html" class="area-link link-guida"></a>
        <a href="ricette.html" class="area-link link-ricette"></a>
        <a href="index.html" class="area-link link-home"></a>
    </div>

</body>
</html>
