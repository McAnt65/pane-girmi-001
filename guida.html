<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida - Il Forno di M&F</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        /* Stili base condivisi con la home per coerenza */
        body { margin: 0; background-color: #1a0d00; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #4e342e; }
        .smartphone { width: 360px; height: 640px; background: #e6c9a8; border: 10px solid #8b6b23; position: relative; display: flex; flex-direction: column; overflow: hidden; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); }
        
        .top-label { font-size: 9px; text-align: center; padding: 5px; background: rgba(0,0,0,0.05); }

        .header h1 { font-family: 'UnifrakturMaguntia', cursive; text-align: center; font-size: 22px; margin: 20px 0; }

        /* Diagramma Interfaccia */
        .diagram-container {
            width: 280px;
            height: 180px;
            margin: 0 auto;
            border: 2px solid #5d4037;
            background: rgba(255,255,255,0.3);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .screen-mockup {
            width: 120px;
            height: 70px;
            border: 2px double #8b6b23;
            background: #d4d4b3;
        }

        /* Numeri gialli (Callouts) */
        .dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #daa520;
            color: black;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid black;
        }
        .d1 { top: 10px; left: 10px; }
        .d2 { top: 10px; left: 50%; transform: translateX(-50%); }
        .d3 { top: 10px; right: 10px; }
        .d4 { bottom: 10px; left: 10px; }
        .d5 { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .d6 { bottom: 10px; right: 10px; }

        /* Lista testi */
        .guide-list {
            padding: 20px;
            font-family: 'Crimson Text', serif;
            font-size: 14px;
            overflow-y: auto;
            margin-bottom: 90px;
        }

        .guide-row { display: flex; margin-bottom: 10px; align-items: flex-start; }
        .num-box { background: #daa520; min-width: 20px; height: 20px; border-radius: 50%; text-align: center; margin-right: 10px; font-weight: bold; border: 1px solid black; font-size: 12px; line-height: 20px; }

        /* Navigazione */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 90px; background: #3e2723; border-top: 3px solid #8b6b23; display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; }
        .nav-item { text-align: center; text-decoration: none; color: #d2b48c; font-size: 10px; font-family: 'Crimson Text', serif; }
        .nav-circle { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #8b6b23; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: #4e342e; }
        .active .nav-circle { background: #8b6b23; color: #3e2723; box-shadow: 0 0 15px #daa520; }
    </style>
</head>
<body>
    <div class="smartphone">
        <div class="top-label">BOZZETTI - GUIDA INTERFACCIA - PAG. 2</div>
        
        <header class="header"><h1>Girmi MP20 - Interfaccia</h1></header>

        <div class="diagram-container">
            <div class="screen-mockup"></div>
            <div class="dot d1">1</div><div class="dot d2">2</div><div class="dot d3">3</div>
            <div class="dot d4">4</div><div class="dot d5">5</div><div class="dot d6">6</div>
        </div>

        <div class="guide-list">
            <div class="guide-row"><div class="num-box">1</div><span><b>MENU:</b> Seleziona il programma (1-12).</span></div>
            <div class="guide-row"><div class="num-box">2</div><span><b>DISPLAY:</b> Tempo e impostazioni.</span></div>
            <div class="guide-row"><div class="num-box">3</div><span><b>DORATURA:</b> Livello crosta.</span></div>
            <div class="guide-row"><div class="num-box">4</div><span><b>PESO:</b> 700g o 900g.</span></div>
            <div class="guide-row"><div class="num-box">5</div><span><b>TEMPO:</b> Avvio ritardato.</span></div>
            <div class="guide-row"><div class="num-box">6</div><span><b>AVVIO/STOP:</b> Gestione ciclo.</span></div>
        </div>

        <nav class="nav-bar">
            <a href="index.html" class="nav-item"><div class="nav-circle">⚙</div>PROGRAMMI</a>
            <a href="#" class="nav-item active"><div class="nav-circle">🧭</div>GUIDA</a>
            <a href="#" class="nav-item"><div class="nav-circle">🌾</div>RICETTE</a>
        </nav>
    </div>
</body>
</html>
