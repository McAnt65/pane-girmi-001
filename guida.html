<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Macchina - Il Forno</title>
    <style>
        /* Reset e Base */
        body { 
            margin: 0; 
            padding: 0;
            background: #1a0f00; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Georgia', serif; 
        }
        
        .schermo-telefono {
            width: 360px;
            height: 640px;
            /* Usa l'immagine originale che contiene già i testi */
            background-image: url('sfondo_pag2.jpg'); 
            background-size: cover;
            background-position: center;
            position: relative;
            border: 4px solid #5d4037;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Navigazione Inferiore (Tasti Attivi) */
        .footer-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 130px; /* Spazio per tastoni + tasto home */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 20%, transparent);
        }

        .tastoni-wrap {
            display: flex;
            justify-content: space-around;
            width: 92%;
            margin-bottom: 10px;
        }

        .tasto-pelle {
            width: 95px;
            height: 65px;
            background: #5d4037;
            border: 2px solid #3e2723;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 4px 6px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }

        /* Effetto per il tasto della pagina corrente (GUIDA) */
        .tasto-pelle.active {
            background: #8d6e63;
            border-color: #d4af37;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.2), 0 0 15px rgba(212,175,55,0.4);
            transform: translateY(-2px);
        }

        .tasto-pelle span { 
            font-size: 10px; 
            font-weight: bold; 
            text-align: center; 
            text-transform: uppercase;
            color: #f4e4bc; /* Colore crema vintage */
            letter-spacing: 0.5px;
        }

        /* Tasto Home in fondo */
        .btn-home {
            background: rgba(46, 26, 18, 0.9);
            color: #d4af37;
            padding: 5px 25px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 11px;
            border: 1px solid #d4af37;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .btn-home:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="schermo-telefono">
        
        <div class="footer-nav">
            <div class="tastoni-wrap">
                <a href="programmi.html" class="tasto-pelle">
                    <span>Programmi</span>
                </a>
                
                <a href="guida.html" class="tasto-pelle active">
                    <span>Guida Macchina</span>
                </a>
                
                <a href="ricette.html" class="tasto-pelle">
                    <span>Ricette</span>
                </a>
            </div>

            <a href="index.html" class="btn-home">Torna alla Home</a>
        </div>
        
    </div>

</body>
</html>
