<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Comandi - Il Forno</title>
    <style>
        body { 
            margin: 0; 
            background: #1a0f00; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Georgia', serif; 
        }
        
        .schermo-telefono {
            width: 360px;
            height: 640px;
            background-image: url('sfondo_pag2.jpg'); /* Assicurati di rinominare l'ultima immagine così */
            background-size: cover;
            background-position: center;
            position: relative;
            border: 4px solid #5d4037;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* Stile comune per le etichette dei comandi */
        .etichetta {
            position: absolute;
            color: #3e2723;
            font-size: 10px;
            font-weight: bold;
            line-height: 1.1;
            text-align: center;
            width: 70px; /* Larghezza per adattarsi alle palette del disegno */
            pointer-events: none; /* Non interferisce con i click */
        }

        /* Posizionamento preciso sulle palette del bozzetto */
        /* Sinistra */
        .pos-menu   { top: 268px; left: 45px; }
        .pos-peso   { top: 325px; left: 45px; }
        .pos-timer  { top: 382px; left: 45px; }

        /* Destra */
        .pos-display { top: 268px; right: 45px; }
        .pos-crosta  { top: 325px; right: 45px; }
        .pos-avvio   { top: 382px; right: 45px; }
        
        /* Centrale Basso */
        .pos-nav     { bottom: 205px; left: 145px; width: 80px; }

        /* Navigazione inferiore */
        .nav-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 110px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }
        
        .nav-link { 
            text-decoration: none; 
            cursor: pointer; 
        }

    </style>
</head>
<body>

    <div class="schermo-telefono">
        
        <div class="etichetta pos-menu">SELEZIONE<br>MENU</div>
        <div class="etichetta pos-peso">PESO<br>IMPASTO</div>
        <div class="etichetta pos-timer">AVVIO<br>RITARDATO</div>

        <div class="etichetta pos-display">SCHERMO<br>VISIVO</div>
        <div class="etichetta pos-crosta">COLORE<br>CROSTA</div>
        <div class="etichetta pos-avvio">AVVIO<br>ARRESTO</div>
        
        <div class="etichetta pos-nav">NAVIGAZIONE<br>MENU</div>

        <div class="nav-overlay">
            <a href="programmi.html" class="nav-link"></a>
            <a href="index.html" class="nav-link"></a> <a href="ricette.html" class="nav-link"></a>
        </div>
        
    </div>

</body>
</html>
